# 微观 APF 力场参数在 rover3d_navigation/control_law_3D.py 顶部常量（APF_*），优先飞向 GMM 目标
planning_apf_node:
  ros__parameters:
    robot_names: ["bot1", "bot2", "bot3", "bot4"]
    odom_suffix: "global_odom"   # Swarm-LIO2 + map_fusion 全局定位
    goal_topic: "apf_goal"
    trajectory_suffix: "apf_trajectory"
    control_rate: 5.0
    max_apf_try: 10
    gmm_interp_steps: 5
    apf_goal_lock_radius: 0.25
    slp_epsilon: 0.2
    use_gmm_trajectory_slp: true
    esdf_mode: "shm"         # 仅支持 shm（共享内存零拷贝）
    esdf_shm_name: "/fiesta_esdf"
    signed_sdf_enable: true
    signed_sdf_occupied_eps: 1.0e-6
    signed_sdf_inside_offset_vox: 0.5
    esdf_frame_id: "map_origin"
    map_origin_x: -5.0
    map_origin_y: -7.5
    map_origin_z: 0.0
    map_size_x: 22.0
    map_size_y: 17.0
    map_size_z: 6.0
    esdf_resolution: 0.2
    # GC / Wasserstein / Graph 等仅由 config_dir 下预计算文件加载（见 scripts/precompute_config_prior.py）
    config_dir: ""
