planning_node:
  ros__parameters:
    robot_names: ["bot1", "bot2", "bot3", "bot4"]
    odom_suffix: "global_odom"
    goal_topic: "goal_gmm"
    trajectory_suffix: "trajectory"
    trajectory_marker_topic: "trajectory_markers"
    trajectory_marker_line_width: 0.06
    control_rate: 5.0
    max_micro_try: 12
    gmm_interp_steps: 8
    micro_goal_lock_radius: 0.35
    macro_replan_radius: 0.6  # 集群中心距当前宏观段终点 < 此值才触发下一轮 SLP
    density_traj_steps: 12  # A* 重采样上限；步长约 max_step_size
    density_use_astar: true  # density 微观段用 FIESTA ESDF A*
    density_astar_safe_margin: 0.4  # A* 额外裕度 (m)，与 robot_radius 相加
    density_astar_robot_radius: 0.18  # 无人机等效半径 (m)，APF Rdiameter=0.35
    micro_controller: "apf"  # apf | density
    apf_use_esdf: true  # APF 内 ESDF 障碍斥力/步长回退
    slp_epsilon: 1.2
    use_gmm_trajectory_slp: true
    esdf_mode: "shm"  # FIESTA 共享内存，供宏观 CVaR / APF 查询
    esdf_shm_name: "/fiesta_esdf"
    signed_sdf_enable: true
    esdf_native_signed: true
    signed_sdf_occupied_eps: 1.0e-6
    signed_sdf_inside_offset_vox: 0.5
    esdf_frame_id: "map_origin"
    map_origin_x: -5.0
    map_origin_y: -7.5
    map_origin_z: 0.0
    map_size_x: 22.0
    map_size_y: 17.0
    map_size_z: 6.0
    esdf_resolution: 0.25
    # GC / Wasserstein / Graph 等仅由 config_dir 下预计算文件加载
    config_dir: ""
